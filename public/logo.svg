<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#6e5cf7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff9f"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)" rx="20"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="80" x2="400" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#fff" stroke-width="0.5"/>
  </g>
  
  <!-- Main Shield -->
  <g filter="url(#shadow)" transform="translate(200, 200)">
    <!-- Shield shape -->
    <path d="M0,-120 C-60,-120 -100,-80 -100,-20 C-100,40 -40,100 0,140 C40,100 100,40 100,-20 C100,-80 60,-120 0,-120 Z" 
          fill="none" 
          stroke="url(#shieldGradient)" 
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- Inner shield -->
    <path d="M0,-100 C-45,-100 -75,-65 -75,-15 C-75,35 -30,85 0,120 C30,85 75,35 75,-15 C75,-65 45,-100 0,-100 Z" 
          fill="url(#shieldGradient)" 
          opacity="0.15"/>
    
    <!-- Checkmark -->
    <g filter="url(#glow)" transform="translate(0, 10)">
      <path d="M-35,0 L-10,30 L40,-25" 
            fill="none" 
            stroke="url(#accentGradient)" 
            stroke-width="12"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>
    
    <!-- Lock/Key icon inside -->
    <g transform="translate(0, 60)" opacity="0.8">
      <circle cx="-15" cy="-5" r="20" fill="none" stroke="#00ff9f" stroke-width="3"/>
      <rect x="-5" y="-5" width="25" height="35" rx="3" fill="#00ff9f"/>
      <circle cx="10" cy="8" r="4" fill="#1a1a2e"/>
    </g>
  </g>
  
  <!-- SUPABASE text -->
  <text x="200" y="355" 
        font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="28" 
        font-weight="700" 
        fill="#fff" 
        text-anchor="middle"
        letter-spacing="4">SUPABASE</text>
  
  <!-- GUARD text -->
  <text x="200" y="380" 
        font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="22" 
        font-weight="600" 
        fill="url(#accentGradient)" 
        text-anchor="middle"
        letter-spacing="6">GUARD</text>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="8" fill="#00d4ff"/>
    <circle cx="350" cy="80" r="6" fill="#6e5cf7"/>
    <circle cx="320" cy="340" r="10" fill="#00ff9f"/>
    <circle cx="60" cy="320" r="5" fill="#a855f7"/>
  </g>
  
  <!-- Corner accents -->
  <g stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.5">
    <path d="M20,40 L20,20 L40,20"/>
    <path d="M360,40 L380,20 L380,40"/>
    <path d="M20,360 L20,380 L40,380"/>
    <path d="M360,360 L380,380 L380,360"/>
  </g>
</svg>
